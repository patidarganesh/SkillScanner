<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillScan Analysis Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #030712;
            --green: #10b981;
            --green-glow: rgba(16, 185, 129, 0.4);
            --red: #f43f5e;
            --orange: #f97316;
            --yellow: #facc15;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --muted: #64748b;
            --border: rgba(255, 255, 255, 0.1);
            --panel: rgba(15, 23, 42, 0.6);
            --text: #f8fafc;
            --font-mono: 'JetBrains Mono', monospace;
            --font-head: 'Syne', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-mono);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.08), transparent 25%);
            z-index: -1;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -2;
            pointer-events: none;
        }

        h1,
        h2,
        h3,
        h4 {
            font-family: var(--font-head);
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        a {
            color: var(--green);
            text-decoration: none;
            transition: all 0.2s;
        }

        a:hover {
            color: #fff;
            text-shadow: 0 0 8px var(--green-glow);
        }

        .glass-panel {
            background: var(--panel);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        button {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 8px;
            font-family: var(--font-mono);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        button.primary {
            background: rgba(16, 185, 129, 0.15);
            color: var(--green);
            border-color: rgba(16, 185, 129, 0.4);
        }

        button.primary:hover {
            background: rgba(16, 185, 129, 0.25);
            border-color: var(--green);
        }

        /* Navigation Bar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-family: var(--font-head);
            font-weight: 800;
            font-size: 1.5rem;
            color: #fff;
            text-decoration: none;
        }

        .nav-logo img {
            height: 48px;
            width: auto;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading Screen */
        #screen-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
        }

        .loader-ring {
            width: 80px;
            height: 80px;
            border: 3px solid rgba(16, 185, 129, 0.1);
            border-radius: 50%;
            border-top-color: var(--green);
            animation: spin 1s infinite cubic-bezier(0.6, 0.2, 0.4, 0.8);
            margin-bottom: 30px;
            box-shadow: 0 0 20px var(--green-glow);
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .progress-bar {
            width: 350px;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin: 25px 0;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
            width: 50%;
            position: absolute;
            left: -50%;
            animation: progress 2s infinite ease-in-out;
        }

        @keyframes progress {
            0% {
                left: -50%;
            }

            100% {
                left: 100%;
            }
        }

        #loading-msg {
            color: #fff;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        #loading-sub {
            color: var(--green);
            margin-top: 10px;
            font-size: 0.95rem;
        }

        /* Error Screen */
        #screen-error {
            display: none;
            text-align: center;
            margin-top: 100px;
            color: var(--red);
        }

        #screen-error h2 {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        /* Results Screen */
        #screen-results {
            display: none;
        }

        .row {
            margin-bottom: 30px;
        }

        /* Hero */
        .hero {
            padding: 30px;
            display: flex;
            align-items: center;
            gap: 40px;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--green-glow) 0%, transparent 70%);
            opacity: 0.1;
            transform: translate(30%, -30%);
            border-radius: 50%;
        }

        .hero-info {
            flex: 1;
            z-index: 2;
        }

        .hero-title {
            font-family: var(--font-head);
            font-size: 2.2rem;
            margin-bottom: 10px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .hero-desc {
            color: #cbd5e1;
            margin-bottom: 20px;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .hero-meta {
            display: flex;
            gap: 25px;
            font-size: 0.9rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .hero-meta span {
            color: var(--muted);
        }

        .score-circle {
            width: 140px;
            height: 140px;
            position: relative;
            filter: drop-shadow(0 0 15px rgba(0, 0, 0, 0.5));
            z-index: 2;
        }

        .score-circle svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .circle-bg {
            fill: rgba(0, 0, 0, 0.2);
            stroke: rgba(255, 255, 255, 0.05);
            stroke-width: 8;
        }

        .circle-prog {
            fill: none;
            stroke: var(--green);
            stroke-width: 8;
            stroke-dasharray: 283;
            stroke-dashoffset: 283;
            transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s;
            stroke-linecap: round;
        }

        .score-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .score-num {
            font-size: 2.5rem;
            font-weight: 800;
            font-family: var(--font-head);
            line-height: 1;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .score-label {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
        }

        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }

        .stat-card {
            padding: 20px 15px;
            text-align: center;
            transition: transform 0.2s;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.03) 0%, transparent 100%);
        }

        .stat-card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.05);
        }

        .stat-num {
            font-size: 2.2rem;
            font-family: var(--font-head);
            font-weight: 700;
            margin-bottom: 5px;
            color: #fff;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .stat-card.stat-critical .stat-num {
            color: var(--red);
            text-shadow: 0 0 10px rgba(244, 63, 94, 0.4);
        }

        .stat-card.stat-high .stat-num {
            color: var(--orange);
        }

        .stat-card.stat-medium .stat-num {
            color: var(--yellow);
        }

        .stat-card.stat-strengths .stat-num {
            color: var(--green);
        }

        .stat-card.stat-missing .stat-num {
            color: var(--purple);
        }

        /* File Cards */
        .files-scroll {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 5px 5px 20px 5px;
            margin: 0 -5px;
            scroll-behavior: smooth;
        }

        .files-scroll::-webkit-scrollbar {
            height: 8px;
        }

        .files-scroll::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .file-card {
            flex: 0 0 240px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .file-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--muted);
            transition: 0.3s;
        }

        .file-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        .file-card:hover::before {
            width: 100%;
            opacity: 0.05;
        }

        .f-name {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1.05rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
        }

        .f-role {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 15px;
            height: 40px;
            overflow: hidden;
            line-height: 1.4;
        }

        .f-score {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            font-weight: bold;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px 12px;
            border-radius: 6px;
        }

        .score-high::before {
            background: var(--green);
        }

        .score-high .f-score span:last-child {
            color: var(--green);
        }

        .score-med::before {
            background: var(--yellow);
        }

        .score-med .f-score span:last-child {
            color: var(--yellow);
        }

        .score-low::before {
            background: var(--red);
        }

        .score-low .f-score span:last-child {
            color: var(--red);
        }

        /* Issues */
        .section-header {
            margin-bottom: 20px;
            color: #fff;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: rgba(0, 0, 0, 0.2);
            padding: 8px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .filter-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--muted);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .filter-btn.active {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
        }

        .issue-row {
            background: linear-gradient(90deg, rgba(15, 23, 42, 0.8) 0%, rgba(15, 23, 42, 0.4) 100%);
            border: 1px solid var(--border);
            border-left: 4px solid var(--border);
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
            animation: slideIn 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards;
            opacity: 0;
            transform: translateX(-15px);
            transition: all 0.2s;
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .issue-row.hidden {
            display: none !important;
        }

        .issue-row.highlight {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
            transform: scale(1.01);
            z-index: 10;
            position: relative;
        }

        .iss-critical {
            border-left-color: var(--red);
        }

        .iss-high {
            border-left-color: var(--orange);
        }

        .iss-medium {
            border-left-color: var(--yellow);
        }

        .iss-low,
        .iss-suggestion {
            border-left-color: var(--blue);
        }

        .iss-strength {
            border-left-color: var(--green);
        }

        .iss-missing {
            border-left-color: var(--purple);
        }

        .issue-header {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            cursor: pointer;
            gap: 20px;
        }

        .issue-header:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .iss-badge {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            width: 100px;
            padding: 4px 8px;
            border-radius: 4px;
            text-align: center;
        }

        .iss-critical .iss-badge {
            background: rgba(244, 63, 94, 0.1);
            color: var(--red);
        }

        .iss-high .iss-badge {
            background: rgba(249, 115, 22, 0.1);
            color: var(--orange);
        }

        .iss-medium .iss-badge {
            background: rgba(250, 204, 21, 0.1);
            color: var(--yellow);
        }

        .iss-low .iss-badge,
        .iss-suggestion .iss-badge {
            background: rgba(59, 130, 246, 0.1);
            color: var(--blue);
        }

        .iss-strength .iss-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--green);
        }

        .iss-missing .iss-badge {
            background: rgba(139, 92, 246, 0.1);
            color: var(--purple);
        }

        .iss-file {
            color: #94a3b8;
            font-size: 0.9rem;
            width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .iss-title {
            flex: 1;
            font-weight: 500;
            font-size: 1.05rem;
            color: #f8fafc;
        }

        .iss-toggle {
            color: var(--muted);
            transition: transform 0.3s;
        }

        .issue-body {
            padding: 0 20px 20px 160px;
            display: none;
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .issue-row.expanded .issue-body {
            display: block;
            border-top: 1px dashed rgba(255, 255, 255, 0.05);
            margin-top: 5px;
            padding-top: 15px;
        }

        .issue-row.expanded .iss-toggle {
            transform: rotate(180deg);
        }

        .iss-desc {
            margin-bottom: 15px;
        }

        .iss-loc {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 12px;
            display: inline-block;
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 10px;
            border-radius: 4px;
        }

        .iss-fix {
            background: rgba(16, 185, 129, 0.08);
            border-left: 3px solid var(--green);
            padding: 12px 16px;
            color: #a7f3d0;
            border-radius: 0 4px 4px 0;
        }

        /* Two columns */
        .two-cols {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        .col-box {
            padding: 25px;
        }

        .col-box h3 {
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .note-item {
            margin-bottom: 18px;
            padding-bottom: 18px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
        }

        .note-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .note-title {
            font-weight: 600;
            color: var(--red);
            margin-bottom: 8px;
            font-size: 1.05rem;
        }

        .note-title.warning {
            color: var(--yellow);
        }

        .note-desc {
            font-size: 0.95rem;
            color: #cbd5e1;
        }

        .col-box.secure-box h3 {
            color: var(--red);
        }

        /* Roadmap */
        .rm-item {
            display: flex;
            gap: 25px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, transparent 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: transform 0.2s, background 0.2s;
        }

        .rm-item:hover {
            transform: translateX(5px);
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .rm-num {
            font-family: var(--font-head);
            font-size: 2rem;
            color: rgba(255, 255, 255, 0.1);
            font-weight: 800;
            width: 50px;
            text-align: center;
            align-self: center;
        }

        .rm-content {
            flex: 1;
        }

        .rm-meta {
            font-size: 0.75rem;
            font-family: var(--font-mono);
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .rm-meta span {
            color: var(--green);
            background: rgba(16, 185, 129, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .rm-action {
            font-weight: 600;
            font-size: 1.15rem;
            margin-bottom: 6px;
            color: #fff;
        }

        .rm-why {
            font-size: 0.95rem;
            color: #94a3b8;
        }

        /* Tree */
        .tree-box {
            margin-bottom: 40px;
            overflow: hidden;
        }

        .tree-header {
            padding: 18px 25px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            font-weight: 500;
        }

        .tree-header:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .tree-content {
            padding: 25px;
            margin: 0;
            white-space: pre;
            font-size: 0.9rem;
            color: #cbd5e1;
            overflow-x: auto;
            background: rgba(0, 0, 0, 0.3);
            display: none;
        }

        .tree-box.expanded .tree-content {
            display: block;
            border-top: 1px solid var(--border);
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="/" class="nav-logo">
            <img src="{{ url_for('static', filename='logo-transparent.png') }}" alt="SkillScan"
                onerror="this.onerror=null;this.src='';this.style.display='none'">
        </a>
        <a href="/" class="primary"
            style="padding: 8px 16px; border-radius: 6px; font-size: 0.9rem; background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: #fff; display: inline-flex; align-items:center;">
            <span>&larr;</span> New Scan
        </a>
    </div>

    <div class="container">

        <!-- SCREEN 2: LOADING -->
        <div id="screen-loading">
            <div class="loader-ring"></div>
            <h2 id="loading-msg">Fetching Security Scan...</h2>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <p id="loading-sub">Connecting to local engine...</p>
        </div>

        <div id="screen-error">
            <h2>🚨 Analysis Failed</h2>
            <p id="error-msg" style="margin-bottom: 30px;"></p>
            <a href="/"><button class="primary" style="padding: 10px 20px;">Return Home</button></a>
        </div>

        <!-- SCREEN 3: RESULTS -->
        <div id="screen-results">
            <!-- Hero -->
            <div class="row hero glass-panel" id="res-hero"></div>

            <!-- Files -->
            <div class="row files-scroll" id="res-files"></div>

            <!-- Stats -->
            <div class="row stats-row glass-panel" style="padding: 10px; margin-bottom: 40px;" id="res-stats"></div>

            <!-- Issues -->
            <div class="row">
                <h3 class="section-header">🛡️ Threat Findings</h3>
                <div class="filters" id="res-filters"></div>
                <div id="res-issues"></div>
            </div>

            <!-- Two Cols -->
            <div class="row two-cols">
                <div class="col-box glass-panel" id="res-cross"></div>
                <div class="col-box secure-box glass-panel" id="res-sec" style="border-color: rgba(244, 63, 94, 0.2);">
                </div>
            </div>

            <!-- Roadmap -->
            <div class="row" style="margin-top: 50px;">
                <h3 class="section-header">🚨 Remediation Priority</h3>
                <div id="res-roadmap"></div>
            </div>

            <!-- Tree -->
            <div class="tree-box glass-panel">
                <div class="tree-header" onclick="this.parentElement.classList.toggle('expanded')">
                    <span>▶ Review File Structure</span>
                    <span style="color:var(--muted); font-size: 0.85rem;">[ click to expand ]</span>
                </div>
                <pre class="tree-content" id="res-tree"></pre>
            </div>
        </div>

    </div>

    <script>
        // Extract Scan ID from URL path (e.g., /results/1234-abcd)
        const pathParts = window.location.pathname.split('/');
        const scanId = pathParts[pathParts.length - 1];

        // State
        let currentIssues = [];
        let pollInterval;
        let loadTick = 0;
        const subMsgs = ["Initializing environment...", "Scanning architecture...", "Parsing configuration...", "Analyzing security patterns...", "AI generating audit..."];

        // Init
        if (!scanId || scanId === 'results') {
            document.getElementById('screen-loading').style.display = 'none';
            document.getElementById('screen-error').style.display = 'block';
            document.getElementById('error-msg').innerText = "Invalid Session ID. Please start a new scan.";
        } else {
            document.getElementById('loading-sub').innerText = subMsgs[0];
            pollInterval = setInterval(pollScanStatus, 2000);
            pollScanStatus(); // initial call
        }

        async function pollScanStatus() {
            try {
                const res = await fetch(`/api/scan/${scanId}`);
                const data = await res.json();

                if (!data.success) {
                    throw new Error(data.error);
                }

                const status = data.data.status;

                if (status === 'error') {
                    throw new Error(data.data.error || "Unknown analysis error");
                } else if (status === 'completed') {
                    clearInterval(pollInterval);
                    document.getElementById('screen-loading').style.display = 'none';
                    renderResults(data.data);
                } else {
                    // Update loading UI based on state
                    loadTick++;
                    document.getElementById('loading-sub').innerText = data.data.progress || subMsgs[loadTick % subMsgs.length];
                }
            } catch (err) {
                clearInterval(pollInterval);
                document.getElementById('screen-loading').style.display = 'none';
                document.getElementById('screen-error').style.display = 'block';
                document.getElementById('error-msg').innerText = err.message;
            }
        }

        function getColorClass(score) {
            if (score >= 70) return 'score-high';
            if (score >= 50) return 'score-med';
            return 'score-low';
        }

        function getColorHex(score) {
            if (score >= 70) return 'var(--green)';
            if (score >= 50) return 'var(--yellow)';
            return 'var(--red)';
        }

        function countUp(el, endVal, durationMs) {
            let start = null;
            const step = (timestamp) => {
                if (!start) start = timestamp;
                const progress = Math.min((timestamp - start) / durationMs, 1);
                el.innerText = Math.floor(progress * endVal);
                if (progress < 1) window.requestAnimationFrame(step);
            };
            window.requestAnimationFrame(step);
        }

        function renderResults(scanData) {
            const ai = scanData.result;
            const scan = scanData.scan_summary;
            document.getElementById('screen-results').style.display = 'block';

            // Build Hero — security focused
            const score = ai.overall_score || 0;
            const colHex = getColorHex(score);
            let dots = "";
            for (let i = 1; i <= 10; i++) {
                dots += (i <= score / 10) ? "●" : "○";
            }

            const threatLevel = ai.threat_level || 'UNKNOWN';
            const isSafe = ai.safe_to_use ? "✅ Safe to Use" : "🚫 NOT Safe";
            const threatColor = threatLevel === 'CRITICAL' || threatLevel === 'HIGH' ? 'var(--red)' : threatLevel === 'MEDIUM' ? 'var(--orange)' : 'var(--green)';

            document.getElementById('res-hero').innerHTML = `
                <div class="score-circle">
                    <svg viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" class="circle-bg"></circle>
                        <circle cx="50" cy="50" r="45" class="circle-prog" id="hero-prog" stroke="${colHex}"></circle>
                    </svg>
                    <div class="score-text">
                        <div class="score-num" style="color: ${colHex}" id="hero-score">0</div>
                        <div class="score-label">Safety</div>
                    </div>
                </div>
                <div class="hero-info">
                    <div class="hero-title">🛡️ ${ai.package_name || scan.name}</div>
                    <div class="hero-desc">${ai.summary || ai.package_purpose || ''}</div>
                    <div style="color: ${colHex}; margin-bottom: 10px; font-family:var(--font-mono); font-size: 0.95rem; font-weight:bold;">
                        [Score: ${score}] <span style="letter-spacing: 2px; color:rgba(255,255,255,0.7)">${dots}</span> &nbsp; ${ai.verdict || ''}
                    </div>
                    <div class="hero-meta">
                        <div><span>Safety:</span> ${isSafe}</div>
                        <div><span>Threat Level:</span> <b style="color:${threatColor}">${threatLevel}</b></div>
                        <div><span>Scanned:</span> ${(ai.stats && ai.stats.files_scanned) || scan.readable_files || 0} files</div>
                    </div>
                </div>
            `;

            setTimeout(() => {
                const prog = document.getElementById('hero-prog');
                if (prog) prog.style.strokeDashoffset = 283 - (283 * Math.max(0, Math.min(score, 100)) / 100);
                countUp(document.getElementById('hero-score'), score, 1500);
            }, 100);

            // Files — risk assessment
            const filesDiv = document.getElementById('res-files');
            filesDiv.innerHTML = '';
            const fileData = ai.file_risk_assessment || ai.files_understood || [];
            fileData.forEach(f => {
                const risk = f.risk_level || f.quality || 'safe';
                const riskColor = risk === 'dangerous' || risk === 'high_risk' ? 'score-low' : risk === 'medium_risk' ? 'score-med' : 'score-high';
                const threats = f.threats_found !== undefined ? f.threats_found : (f.score || 0);

                let card = document.createElement('div');
                card.className = `file-card glass-panel ${riskColor}`;
                card.innerHTML = `
                    <div class="f-name" title="${f.path}">📄 ${f.path.split('/').pop()}</div>
                    <div class="f-role" title="${f.role || ''}">${f.role || ''}</div>
                    <div class="f-score">
                        <span style="color:#fff;">Threats: ${threats}</span>
                        <span>${(risk || '').toUpperCase().replace('_', ' ')}</span>
                    </div>
                `;
                filesDiv.appendChild(card);
            });

            // Normalize threats into issues list
            let allIssues = [];

            (ai.threat_findings || ai.issues || []).forEach(i => {
                allIssues.push({
                    type: i.category || i.type || 'threat', severity: i.severity || 'info', title: i.title || '',
                    description: i.description || '', location: i.location || '',
                    file: (i.location || '').split(':')[0].split('>')[0].trim(),
                    fix: i.recommendation || i.fix || null,
                    evidence: i.evidence || null
                });
            });

            (ai.security_positives || ai.strengths || []).forEach(s => {
                allIssues.push({ type: 'strength', severity: 'info', title: 'Security Positive', description: s, location: '', file: '', fix: null, evidence: null });
            });

            currentIssues = allIssues;

            // Stats row
            const stats = ai.stats || {};
            let counts = { critical: stats.critical || 0, high: stats.high || 0, medium: stats.medium || 0, safe: stats.safe_files || 0, risky: stats.risky_files || 0 };
            if (!stats.critical) {
                allIssues.forEach(i => {
                    if (i.severity === 'critical') counts.critical++;
                    else if (i.severity === 'high') counts.high++;
                    else if (i.severity === 'medium') counts.medium++;
                });
            }

            document.getElementById('res-stats').innerHTML = `
                <div class="stat-card"><div class="stat-num" id="st-total">0</div><div class="stat-label">Scanned</div></div>
                <div class="stat-card stat-critical"><div class="stat-num" id="st-crit">0</div><div class="stat-label">Critical</div></div>
                <div class="stat-card stat-high"><div class="stat-num" id="st-high">0</div><div class="stat-label">High</div></div>
                <div class="stat-card stat-medium"><div class="stat-num" id="st-med">0</div><div class="stat-label">Medium</div></div>
                <div class="stat-card stat-strengths"><div class="stat-num" id="st-safe">0</div><div class="stat-label">Safe Files</div></div>
                <div class="stat-card stat-missing"><div class="stat-num" id="st-risky">0</div><div class="stat-label">Risky Files</div></div>
            `;
            setTimeout(() => {
                countUp(document.getElementById('st-total'), stats.files_scanned || scan.readable_files || 0, 1000);
                countUp(document.getElementById('st-crit'), counts.critical, 1000);
                countUp(document.getElementById('st-high'), counts.high, 1000);
                countUp(document.getElementById('st-med'), counts.medium, 1000);
                countUp(document.getElementById('st-safe'), counts.safe, 1000);
                countUp(document.getElementById('st-risky'), counts.risky, 1000);
            }, 100);

            // Filters
            const filtersDiv = document.getElementById('res-filters');
            const strengthCount = allIssues.filter(i => i.type === 'strength').length;
            const fGroups = [
                { id: 'all', label: `All [${allIssues.length}]` }, { id: 'critical', label: `🚨 Critical [${counts.critical}]` },
                { id: 'high', label: `🔴 High [${counts.high}]` }, { id: 'medium', label: `⚠️ Medium [${counts.medium}]` },
                { id: 'strength', label: `✅ Safe [${strengthCount}]` }
            ];
            filtersDiv.innerHTML = fGroups.map(g => `<button class="filter-btn ${g.id === 'all' ? 'active' : ''}" onclick="applyFilter('${g.id}', this)">${g.label}</button>`).join('');

            renderIssues('all');

            // Network Analysis & Permissions
            const crossDiv = document.getElementById('res-cross');
            crossDiv.innerHTML = '<h3>🌐 Network Analysis</h3>';
            const netAnalysis = ai.network_analysis;
            if (netAnalysis && netAnalysis.outbound_connections && netAnalysis.outbound_connections.length) {
                netAnalysis.outbound_connections.forEach(conn => {
                    const riskClass = conn.risk === 'dangerous' ? 'color:var(--red)' : conn.risk === 'suspicious' ? 'color:var(--orange)' : 'color:var(--green)';
                    crossDiv.innerHTML += `<div class="note-item"><div class="note-title" style="${riskClass}">${conn.url}</div><div class="note-desc">File: <b>${conn.file}</b><br>Purpose: ${conn.purpose}<br><span style="font-size:0.8rem; margin-top:8px; display:inline-block; ${riskClass}; font-weight:bold;">Risk: ${conn.risk.toUpperCase()}</span></div></div>`;
                });
                if (netAnalysis.data_sent_externally) {
                    crossDiv.innerHTML += `<div style="margin-top:12px; padding:10px; background:rgba(244,63,94,0.1); border:1px solid rgba(244,63,94,0.3); border-radius:8px; color:var(--red); font-size:0.9rem;"><b>⚠️ Data Exfiltration:</b> ${netAnalysis.data_sent_externally}</div>`;
                }
            } else if (ai.cross_file_issues && ai.cross_file_issues.length) {
                ai.cross_file_issues.forEach(c => {
                    crossDiv.innerHTML += `<div class="note-item"><div class="note-title warning">${(c.files || []).join(' ↔ ')}</div><div class="note-desc"><b>${c.title}</b><br>${c.description}</div></div>`;
                });
            } else { crossDiv.innerHTML += `<div style="color:var(--green); font-size:1.1rem; padding: 20px 0;">✅ No suspicious network activity</div>`; }

            const secDiv = document.getElementById('res-sec');
            secDiv.innerHTML = '<h3>🔒 Permissions & Access</h3>';
            const perms = ai.permissions_analysis;
            if (perms) {
                const permItems = [
                    { label: '📂 File Access', data: perms.file_system_access },
                    { label: '🌐 Network', data: perms.network_access },
                    { label: '💻 Shell Exec', data: perms.shell_execution },
                    { label: '🔑 Env Vars', data: perms.environment_access }
                ];
                permItems.forEach(p => {
                    if (p.data && p.data.length) {
                        secDiv.innerHTML += `<div class="note-item"><div class="note-title">${p.label}</div><div class="note-desc">${p.data.join(', ')}</div></div>`;
                    }
                });
                if (perms.excessive_permissions) {
                    secDiv.innerHTML += `<div style="margin-top:12px; padding:10px; background:rgba(244,63,94,0.1); border:1px solid rgba(244,63,94,0.3); border-radius:8px; color:var(--red); font-size:0.9rem;"><b>⚠️ Excessive Permissions:</b> ${perms.justification}</div>`;
                }
            } else if (ai.security_notes && ai.security_notes.length) {
                ai.security_notes.forEach(s => {
                    secDiv.innerHTML += `<div class="note-item"><div class="note-title">Security Risk</div><div class="note-desc">${s}</div></div>`;
                });
            } else { secDiv.innerHTML += `<div style="color:var(--green); font-size:1.1rem; padding: 20px 0;">✅ No excessive permissions detected</div>`; }

            // Roadmap
            const rmDiv = document.getElementById('res-roadmap');
            rmDiv.innerHTML = '';
            const roadmap = ai.remediation_priority || ai.improvement_roadmap || [];
            if (roadmap.length) {
                roadmap.forEach((r, i) => {
                    const sevColor = r.severity === 'critical' ? 'var(--red)' : r.severity === 'high' ? 'var(--orange)' : 'var(--yellow)';
                    rmDiv.innerHTML += `<div class="rm-item glass-panel"><div class="rm-num" style="background:${sevColor}; color:#000;">#${r.step || (i + 1)}</div><div class="rm-content"><div class="rm-meta">[<span>${r.severity || r.effort} PRIORITY</span> &rarr; <span>${r.effort} EFFORT</span>]</div><div class="rm-action">${r.action}</div><div class="rm-why">Why: ${r.why}</div></div></div>`;
                });
            } else { rmDiv.innerHTML = '<div style="color:var(--green)">✅ No remediation needed. Package is clean.</div>'; }

            document.getElementById('res-tree').innerText = scan.file_tree || 'No structure found';
        }

        function renderIssues(filter) {
            const listDiv = document.getElementById('res-issues');
            listDiv.innerHTML = '';
            let delay = 0;
            currentIssues.forEach((i, idx) => {
                let show = false;
                if (filter === 'all') show = true;
                else if (filter === 'critical' && i.severity === 'critical') show = true;
                else if (filter === 'high' && i.severity === 'high') show = true;
                else if (filter === 'medium' && i.severity === 'medium') show = true;
                else if (filter === 'strength' && i.type === 'strength') show = true;
                else if (filter === 'missing' && i.type === 'missing') show = true;

                if (!show) return;

                let sc = 'iss-low';
                if (i.severity === 'critical') sc = 'iss-critical';
                else if (i.severity === 'high') sc = 'iss-high';
                else if (i.severity === 'medium') sc = 'iss-medium';
                if (i.type === 'strength') sc = 'iss-strength';
                if (i.type === 'missing') sc = 'iss-missing';

                const row = document.createElement('div');
                row.className = `issue-row ${sc}`;
                row.dataset.file = i.file;
                row.style.animationDelay = `${delay * 40}ms`;
                delay++;

                row.innerHTML = `
                    <div class="issue-header" onclick="this.parentElement.classList.toggle('expanded')">
                        <div class="iss-badge">${i.severity || i.type}</div>
                        <div class="iss-file">📍 ${i.file || 'Package'}</div>
                        <div class="iss-title">${i.title}</div>
                        <div class="iss-toggle">▼</div>
                    </div>
                    <div class="issue-body">
                        <div class="iss-desc">${i.description}</div>
                        ${i.location ? `<div class="iss-loc">${i.location}</div>` : ''}
                        ${i.fix ? `<div class="iss-fix">&rarr; FIX: ${i.fix}</div>` : ''}
                    </div>
                `;
                listDiv.appendChild(row);
            });
        }

        function applyFilter(id, btnNode) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btnNode.classList.add('active');
            renderIssues(id);
        }
    </script>
</body>

</html>
